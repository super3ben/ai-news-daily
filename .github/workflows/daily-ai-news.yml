name: AI News Daily

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京 10:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python -m src.main 2>&1 | tee output.log

      - name: Commit updated history
        if: success()
        run: |
          if [ -n "$(git status --porcelain data/pushed_urls.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/pushed_urls.json
            git commit -m "chore: update pushed history [skip ci]"
            git push
          else
            echo "No history changes to commit"
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## AI News Daily Run" >> $GITHUB_STEP_SUMMARY
          grep "Pipeline Complete\|Pipeline Start\|Total collected\|ERROR" output.log >> $GITHUB_STEP_SUMMARY || echo "Pipeline did not complete" >> $GITHUB_STEP_SUMMARY
